name: verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tri-agent-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run tri-agent verifier
        run: node scripts/verify-tri-agent.mjs
